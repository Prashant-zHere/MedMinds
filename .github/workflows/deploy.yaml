name : Deploy

on : 
  push:

jobs :
  deploy:
    runs-on : ubuntu-latest
    # needs: test
    steps:
      - name: checkout code
        uses : actions/checkout@v4
      - run : docker build -t ${{secrets.DOCKERHUB_USERNAME}}/medminds .
      - run : echo "${{secrets.DOCKERHUB_PASSWORD}}" | docker login -u ${{secrets.DOCKERHUB_USERNAME}} --password-stdin
      - run : docker push ${{secrets.DOCKERHUB_USERNAME}}/medminds:latest
      # - run : docker run -p 5000:5000 ${{secrets.DOCKER_HUB_USER_NAME}}/test-docker:latest