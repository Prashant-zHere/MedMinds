name : Deploy

on : 
  push:

jobs :
  test:
    runs-on: ubuntu-latest
    

  deploy:
    runs-on : ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses : actions/checkout@v4
      - run : docker build -t ${{secrets.DOCKER_HUB_USER_NAME}}/medminds .
      - run : echo "${{secrets.DOCKER_HUB_PASSWORD}}" | docker login -u ${{secrets.DOCKER_HUB_USER_NAME}} --password-stdin
      - run : docker push ${{secrets.DOCKER_HUB_USER_NAME}}/test-docker:latest
      # - run : docker run -p 5000:5000 ${{secrets.DOCKER_HUB_USER_NAME}}/test-docker:latest